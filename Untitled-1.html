<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AFTON ROBOTICS - TERMINAL</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: 'Courier New', monospace;
    color: #00ff66;
}

/* EFECTO CRT */
.crt::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        rgba(0, 255, 0, 0.05) 0px,
        rgba(0, 255, 0, 0.05) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events: none;
}

/* PARPADEO */
@keyframes flicker {
    0% { opacity: 0.9; }
    50% { opacity: 1; }
    100% { opacity: 0.95; }
}

.terminal {
    padding: 30px;
    height: 100vh;
    animation: flicker 0.1s infinite;
}

input {
    background: transparent;
    border: none;
    color: #00ff66;
    font-family: inherit;
    font-size: 18px;
    outline: none;
    width: 300px;
}

.hidden {
    display: none;
}

.glitch {
    animation: glitch 0.3s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 0 red; }
    50% { text-shadow: -2px 0 blue; }
    100% { text-shadow: 2px 0 red; }
}
</style>
</head>

<body class="crt">

<div class="terminal">

<div id="boot"></div>

<div id="login" class="hidden">
<p>> PASSWORD:</p>
<p>> <input type="text" id="clave"></p>
<p id="mensaje"></p>
</div>

<div id="archivos" class="hidden">
<p class="glitch">Access granted, welcome Mr. Afton...</p>
<br>
<p>> Archivo: SB_PROTO_01</p>
<p>REMNANT</p>
<br>
<p>> Archivo: HALLUCIN_GAS</p>
<p>Gas experimental para inducir miedo extremo y visiones.</p>
<br>
<p style="color:red;">> Archivo: AGONY_VIRUS.exe</p>
<p style="color:red;">Entidad digital creada a partir de energía emocional negativa.</p>
<p style="color:red;">Estado: ACTIVO</p>
</div>

</div>

<script>
const bootText = [
"AFTON ROBOTICS INTERNAL SYSTEM v1.3",
"Inicializando sistema...",
"Cargando módulos...",
"Conectando a servidor interno...",
"ADVERTENCIA: ACCESS REQUIRED...",
""
];

let i = 0;

function bootSequence() {
    if (i < bootText.length) {
        document.getElementById("boot").innerHTML += bootText[i] + "<br>";
        i++;
        setTimeout(bootSequence, 700);
    } else {
        document.getElementById("login").classList.remove("hidden");
        document.getElementById("clave").focus(); // 🔥 auto foco
    }
}

bootSequence();

document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        verificar();
    }
});

function verificar() {
    const clave = document.getElementById("clave").value.trim();
    const mensaje = document.getElementById("mensaje");

    if (clave === "263105") {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("archivos").classList.remove("hidden");
    } else {
        mensaje.innerHTML = "ERROR 401 - ACCESO DENEGADO";
    }
}
</script>

</body>
</html>
